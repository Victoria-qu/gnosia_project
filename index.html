<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>GNOSIA: Cyber Loop Fix</title>
    <style>
        :root { --main: #0ff; --accent: #f0f; --bg: #050510; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; justify-content: center; padding: 20px; }
        #game { width: 600px; border: 2px solid var(--accent); padding: 20px; background: rgba(20,20,50,0.9); box-shadow: 0 0 15px var(--accent); }
        #log { height: 300px; overflow-y: auto; border: 1px solid var(--main); margin: 10px 0; padding: 10px; background: #000; font-size: 14px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
        button { background: transparent; border: 1px solid var(--main); color: var(--main); padding: 5px 10px; cursor: pointer; }
        button:hover { background: var(--main); color: #000; }
        .sys { color: #f9ed69; }
        .danger { color: #ff4d4d; font-weight: bold; }
        .char-box { display: inline-block; border: 1px solid #444; padding: 5px; margin: 5px; min-width: 80px; text-align: center; }
        .alive { border-color: var(--main); }
        .dead { opacity: 0.3; border-color: #555; text-decoration: line-through; }
    </style>
</head>
<body>

<div id="game">
    <h2 id="header">GNOSIA 系統載入中...</h2>
    <div id="unit-status"></div>
    <div id="log"></div>
    <div id="actions" class="btn-group"></div>
</div>

<script>
    // --- 遊戲數據 ---
    let day = 1;
    let players = [
        { id: 0, name: "你(P)", role: "HUMAN", alive: true, sus: 0 },
        { id: 1, name: "沙明", role: "GNOSIA", alive: true, sus: 0 },
        { id: 2, name: "蕾切爾", role: "HUMAN", alive: true, sus: 0 },
        { id: 3, name: "希皮", role: "HUMAN", alive: true, sus: 0 }
    ];

    const logBox = document.getElementById('log');

    function writeLog(msg, clz = '') {
        const p = document.createElement('p');
        p.className = clz;
        p.innerHTML = `> ${msg}`;
        logBox.appendChild(p);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function render() {
        document.getElementById('header').innerText = `第 ${day} 天 - 協調階段`;
        const statusDiv = document.getElementById('unit-status');
        statusDiv.innerHTML = '';
        players.forEach(p => {
            statusDiv.innerHTML += `<div class="char-box ${p.alive?'alive':'dead'}">${p.name}</div>`;
        });
    }

    // --- 遊戲流程 ---
    function startDiscussion() {
        render();
        writeLog(`第 ${day} 天開始。請找出潛伏的古諾希亞。`, 'sys');
        const actDiv = document.getElementById('actions');
        actDiv.innerHTML = '';
        
        // 生成按鈕
        players.filter(p => p.id !== 0 && p.alive).forEach(p => {
            const btn = document.createElement('button');
            btn.innerText = `懷疑 ${p.name}`;
            btn.onclick = () => {
                writeLog(`你指控 [${p.name}] 是古諾希亞。`);
                p.sus += 50;
                aiTurn();
            };
            actDiv.appendChild(btn);
        });
    }

    function aiTurn() {
        // 簡單 AI 反應
        setTimeout(() => {
            const speaker = players.find(p => p.id !== 0 && p.alive);
            writeLog(`${speaker.name}：我也覺得氣氛有點奇怪。`, 'sys');
            showVoteBtn();
        }, 800);
    }

    function showVoteBtn() {
        const actDiv = document.getElementById('actions');
        actDiv.innerHTML = '<button style="border-color:red; color:red" onclick="vote()">前往投票</button>';
    }

    function vote() {
        // 找出嫌疑最高的人
        let target = players.filter(p => p.alive).sort((a,b) => b.sus - a.sus)[0];
        writeLog(`投票結束。多數票決定：冷凍 [${target.name}]。`, 'danger');
        target.alive = false;
        
        if (checkWin()) return;

        writeLog("進入夜晚休息時間...", "sys");
        setTimeout(nightPhase, 1500);
    }

    function nightPhase() {
        // Gnosia 殺人 (沙明是固定的 Gnosia)
        const gnosia = players.find(p => p.role === "GNOSIA");
        if (gnosia.alive) {
            const victims = players.filter(p => p.role !== "GNOSIA" && p.alive);
            const killed = victims[Math.floor(Math.random() * victims.length)];
            killed.alive = false;
            writeLog(`[警告] 發現 [${killed.name}] 的生命訊號消失。`, 'danger');
        }

        if (checkWin()) return;
        day++;
        startDiscussion();
    }

    function checkWin() {
        const gnosiaAlive = players.filter(p => p.role === "GNOSIA" && p.alive).length;
        const humanAlive = players.filter(p => p.role === "HUMAN" && p.alive).length;

        if (gnosiaAlive === 0) {
            writeLog("🎉 勝利：古諾希亞已全部清除。", "sys");
            endGame(); return true;
        }
        if (gnosiaAlive >= humanAlive) {
            writeLog("💀 失敗：古諾希亞佔領了飛船。", "danger");
            endGame(); return true;
        }
        return false;
    }

    function endGame() {
        document.getElementById('actions').innerHTML = '<button onclick="location.reload()">重啟循環</button>';
    }

    // 啟動
    startDiscussion();
</script>

</body>
</html>
